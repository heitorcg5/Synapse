spring:
  application:
    name: synapse-backend
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:synapse}
    username: ${POSTGRES_USER:synapse}
    password: ${POSTGRES_PASSWORD:synapse}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

synapse:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:*,https://localhost,https://localhost:*,http://127.0.0.1,http://127.0.0.1:*,https://127.0.0.1,https://127.0.0.1:*}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    provider: ${AI_PROVIDER:ollama}
    ollama-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3}
    chunk-size-chars: ${AI_CHUNK_SIZE:6000}
    chunk-size-tokens: ${AI_CHUNK_TOKENS:1500}

logging:
  level:
    com.synapse: DEBUG
    org.springframework.security: INFO
